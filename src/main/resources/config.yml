FancyFreeze_Config:
  ConfigVersion: 1
  Messages:
    Prefix: "<gradient:#00E0FF:#008EFF><bold>FancyFreeze</bold></gradient> <gray>» "
    RELOAD: "<gradient:#00FF64:#8AFF00>✦ Config successfully reloaded."
    NO_SELF_FREEZE: "<gradient:#F51010:#FF0091>⚠ You cannot freeze yourself!"
    PLAYER_HAS_PERM: "<gradient:#F51010:#FF0091>⚠ This player is immune to freezing!"
